<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Elfmeter" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="site.webmanifest?v=20260712" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg?v=20260712" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=20260712" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=20260712" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="icons/apple-touch-icon.png?v=20260712" />
  <title>Elfmeterschießen</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111c31;
      --card2: #15233d;
      --text: #f6f8fb;
      --muted: #aebbd0;
      --line: rgba(255,255,255,.12);
      --gold: #ffd54a;
      --silver: #d7dee9;
      --bronze: #d9985f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #1f3764 0, var(--bg) 42%, #070b13 100%);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 0 22px;
    }

    header {
      padding: 10px 0 14px;
      backdrop-filter: blur(14px);
      background: linear-gradient(to bottom, rgba(11,18,32,.95), rgba(11,18,32,.65));
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.5px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 16px 0 0;
    }

    .cup {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius: 18px;
      padding: 12px 10px;
      min-height: 96px;
    }

    .cup strong {
      display: block;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .cup select {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 8px;
      background: var(--card2);
      color: var(--text);
      font-size: 15px;
    }

    .gold { box-shadow: 0 0 0 1px rgba(255,213,74,.35) inset; }
    .silver { box-shadow: 0 0 0 1px rgba(215,222,233,.30) inset; }
    .bronze { box-shadow: 0 0 0 1px rgba(217,152,95,.35) inset; }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Elfmeterschießen</h1>
      <p class="sub">Die ersten drei Pokale auswählen. Alles wird automatisch lokal auf dem iPhone gespeichert.</p>
    </header>

    <section class="podium" aria-label="Pokalplätze">
      <div class="cup gold">
        <strong>🏆 1.</strong>
        <select id="place1" aria-label="Erster Platz"></select>
      </div>
      <div class="cup silver">
        <strong>🥈 2.</strong>
        <select id="place2" aria-label="Zweiter Platz"></select>
      </div>
      <div class="cup bronze">
        <strong>🥉 3.</strong>
        <select id="place3" aria-label="Dritter Platz"></select>
      </div>
    </section>

    <p class="hint">Speicherung: nur lokal auf diesem Gerät/Browser.</p>
  </main>

  <script>
    const players = [
      "Ahmet", "Aos", "Benjamin", "David", "Efe", "Elias", "Jannik", "Jonas", "Julian",
      "Kiril", "Malik", "Mario", "Mika", "Noah", "Noel", "Paul B", "Paul H", "Piotrek", "Semih"
    ];

    const key = "elfmeter_app_v1";
    const selects = [
      document.getElementById("place1"),
      document.getElementById("place2"),
      document.getElementById("place3")
    ];

    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(key));
        if (saved && typeof saved === "object") {
          return { places: saved.places || ["", "", ""] };
        }
      } catch (e) {}
      return { places: ["", "", ""] };
    }

    function saveState() {
      localStorage.setItem(key, JSON.stringify(state));
    }

    function renderSelects() {
      selects.forEach((select, index) => {
        select.innerHTML = "";
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "Auswählen";
        select.appendChild(empty);

        players.forEach(name => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });

        select.value = players.includes(state.places[index]) ? state.places[index] : "";
        select.onchange = () => {
          state.places[index] = select.value;
          saveState();
        };
      });
    }

    renderSelects();
  </script>
</body>
</html>
